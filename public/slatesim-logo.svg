<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 450" role="img" aria-label="Slate Sim logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eeeeee" />
      <stop offset="100%" stop-color="#d8d8d8" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect x="0" y="0" width="450" height="450" fill="url(#bg)" />
  <rect x="38" y="26" width="374" height="398" rx="6" fill="#ffffff" filter="url(#shadow)" />

  <text
    x="225"
    y="200"
    text-anchor="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="112"
    letter-spacing="2"
    fill="#0b0b0b"
  >
    SLATE
  </text>
  <text
    x="225"
    y="324"
    text-anchor="middle"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="125"
    letter-spacing="2"
    fill="#ff6a00"
  >
    SIM
  </text>
</svg>
